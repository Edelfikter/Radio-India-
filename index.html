<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All India Public Radio</title>
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="crt-overlay"></div>

  <header>
    <h1 class="title">ALL INDIA PUBLIC RADIO</h1>
    <p class="subtitle">A WarGames-styled internet radio platform</p>
  </header>

  <main>
    <div id="map-container">
      <div id="map"></div>
      <div class="map-hint" id="map-hint">Click anywhere on the map to place a station</div>
    </div>

    <aside id="sidebar">
      <section id="station-form-section">
        <h2>Create Station</h2>
        <form id="station-form">
          <div class="form-group">
            <label for="station-name">Station Name</label>
            <input type="text" id="station-name" name="name" placeholder="e.g. Radio Bombay" required />
          </div>
          <div class="form-group">
            <label for="station-url">Stream URL</label>
            <input type="url" id="station-url" name="url" placeholder="https://stream.example.com/radio" required />
          </div>
          <div class="form-group coord-group">
            <div>
              <label for="station-lat">Latitude</label>
              <input type="number" id="station-lat" name="lat" step="0.000001" placeholder="Click map" readonly />
            </div>
            <div>
              <label for="station-lng">Longitude</label>
              <input type="number" id="station-lng" name="lng" step="0.000001" placeholder="Click map" readonly />
            </div>
          </div>
          <p class="coord-hint">↑ Click the map to autofill coordinates</p>
          <button type="submit" id="create-btn" disabled>Drop Station</button>
        </form>
      </section>

      <section id="stations-list-section">
        <h2>Stations</h2>
        <ul id="stations-list"></ul>
      </section>
    </aside>
  </main>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
