<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All India Public Radio</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />

  <style>
    /* ── Base reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      font-family: 'Courier New', Courier, monospace;
      color: #00ff41;
      overflow: hidden;
    }

    /* ── Full-viewport map ── */
    #map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      /* Phosphor-green tint over the dark tiles */
      filter: hue-rotate(80deg) saturate(3) brightness(0.75);
    }

    /* ── CRT scanline overlay ── */
    #crt-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1000;
      /* Repeating horizontal scan lines */
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.18) 2px,
        rgba(0, 0, 0, 0.18) 4px
      );
    }

    /* ── CRT vignette / bezel glow ── */
    #crt-vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1001;
      background: radial-gradient(
        ellipse at center,
        transparent 55%,
        rgba(0, 0, 0, 0.75) 100%
      );
    }

    /* ── HUD / title bar ── */
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1002;
      padding: 10px 18px;
      display: flex;
      align-items: baseline;
      gap: 12px;
      background: rgba(0, 0, 0, 0.55);
      border-bottom: 1px solid rgba(0, 255, 65, 0.35);
      text-shadow: 0 0 8px #00ff41;
    }

    #hud h1 {
      font-size: 1.1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    #hud span {
      font-size: 0.75rem;
      opacity: 0.6;
      letter-spacing: 0.15em;
    }

    /* ── Leaflet attribution re-style ── */
    .leaflet-control-attribution {
      background: rgba(0, 0, 0, 0.6) !important;
      color: rgba(0, 255, 65, 0.5) !important;
      font-family: 'Courier New', Courier, monospace !important;
      font-size: 0.6rem !important;
    }

    .leaflet-control-attribution a {
      color: rgba(0, 255, 65, 0.7) !important;
    }

    .leaflet-control-zoom a {
      background: rgba(0, 0, 0, 0.7) !important;
      color: #00ff41 !important;
      border-color: rgba(0, 255, 65, 0.4) !important;
      font-family: 'Courier New', Courier, monospace !important;
      text-shadow: 0 0 6px #00ff41;
    }

    .leaflet-control-zoom a:hover {
      background: rgba(0, 255, 65, 0.15) !important;
    }

    /* ── Phosphor flicker animation ── */
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92%       { opacity: 1; }
      93%       { opacity: 0.85; }
      94%       { opacity: 1; }
      97%       { opacity: 0.9; }
      98%       { opacity: 1; }
    }

    body { animation: flicker 8s infinite; }
  </style>
</head>
<body>

  <!-- Map container -->
  <div id="map"></div>

  <!-- CRT overlay layers (above map, below UI) -->
  <div id="crt-overlay"></div>
  <div id="crt-vignette"></div>

  <!-- HUD title bar -->
  <div id="hud">
    <h1>All India Public Radio</h1>
    <span>// WOPR NODE 7 — SIGNAL ACTIVE</span>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN2GqNk="
          crossorigin=""></script>

  <script>
    // ── Map initialisation ──
    var map = L.map('map', {
      center: [20.5937, 78.9629], // center of India
      zoom: 5,
      minZoom: 3,
      maxZoom: 18,
      zoomControl: true
    });

    // ── CartoDB Dark Matter tile layer ──
    L.tileLayer(
      'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
      {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors ' +
          '&copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
      }
    ).addTo(map);
  </script>
</body>
</html>
