<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALL INDIA PUBLIC RADIO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css"/>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/panels.css">
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <!-- CRT Scanline overlay -->
    <div class="crt-overlay"></div>

    <!-- Top Bar -->
    <div id="topbar">
        <div id="topbar-brand">📡 ALL INDIA PUBLIC RADIO</div>
        <div id="topbar-right">
            <span id="topbar-user"></span>
            <button id="btn-create-station" class="btn-terminal" style="display:none">+ CREATE STATION</button>
            <button id="btn-login" class="btn-terminal">LOGIN / REGISTER</button>
            <button id="btn-logout" class="btn-terminal" style="display:none">LOGOUT</button>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="modal-overlay" style="display:none">
        <div class="terminal-panel" id="auth-panel">
            <div class="panel-header">
                <span id="auth-title">AUTHENTICATION TERMINAL</span>
                <button class="panel-close" onclick="document.getElementById('auth-modal').style.display='none'">✕</button>
            </div>
            <div class="panel-body">
                <div id="auth-tabs">
                    <button class="tab-btn active" onclick="switchAuthTab('login')">LOGIN</button>
                    <button class="tab-btn" onclick="switchAuthTab('register')">REGISTER</button>
                </div>
                <div id="auth-form-login">
                    <label class="field-label">USERNAME:</label>
                    <input type="text" id="login-username" class="terminal-input" placeholder="enter username" autocomplete="username">
                    <label class="field-label">PASSWORD:</label>
                    <input type="password" id="login-password" class="terminal-input" placeholder="enter password" autocomplete="current-password">
                    <button class="btn-terminal btn-primary" onclick="doLogin()">▶ LOGIN</button>
                    <div id="login-error" class="error-msg"></div>
                </div>
                <div id="auth-form-register" style="display:none">
                    <label class="field-label">USERNAME:</label>
                    <input type="text" id="reg-username" class="terminal-input" placeholder="choose username" autocomplete="username">
                    <label class="field-label">PASSWORD:</label>
                    <input type="password" id="reg-password" class="terminal-input" placeholder="choose password" autocomplete="new-password">
                    <button class="btn-terminal btn-primary" onclick="doRegister()">▶ REGISTER</button>
                    <div id="register-error" class="error-msg"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Station Modal -->
    <div id="create-station-modal" class="modal-overlay" style="display:none">
        <div class="terminal-panel" id="create-station-panel">
            <div class="panel-header">
                <span>CREATE NEW STATION</span>
                <button class="panel-close" onclick="document.getElementById('create-station-modal').style.display='none'">✕</button>
            </div>
            <div class="panel-body">
                <label class="field-label">STATION NAME:</label>
                <input type="text" id="cs-name" class="terminal-input" placeholder="My Radio Station">
                <label class="field-label">DESCRIPTION:</label>
                <textarea id="cs-desc" class="terminal-input" rows="2" placeholder="Describe your station..."></textarea>
                <label class="field-label">LATITUDE:</label>
                <input type="number" id="cs-lat" class="terminal-input" placeholder="20.5937" step="any">
                <label class="field-label">LONGITUDE:</label>
                <input type="number" id="cs-lng" class="terminal-input" placeholder="78.9629" step="any">
                <small class="hint-text">TIP: Click on the map to set coordinates</small>
                <label class="field-label">LOOP PLAYLIST:</label>
                <select id="cs-loop" class="terminal-input">
                    <option value="1">YES — Loop continuously</option>
                    <option value="0">NO — Stop after last segment</option>
                </select>
                <button class="btn-terminal btn-primary" onclick="createStation()">▶ CREATE STATION</button>
                <div id="create-station-error" class="error-msg"></div>
            </div>
        </div>
    </div>

    <!-- Station Popup Panel (dynamic, injected near pins) -->
    <div id="station-popup" class="terminal-panel floating-panel" style="display:none">
        <div class="panel-header" id="station-popup-header">
            <span id="station-popup-title">STATION NAME</span>
            <button class="panel-close" onclick="closeStationPopup()">✕</button>
        </div>
        <div class="panel-body" id="station-popup-body">
            <!-- Dynamic content -->
        </div>
    </div>

    <!-- Chat Panel -->
    <div id="chat-panel" class="terminal-panel">
        <div class="panel-header" id="chat-header">
            <span>📻 GLOBAL CHAT</span>
            <div>
                <span id="chat-listener-count"></span>
                <button class="panel-close" onclick="toggleChat()">—</button>
            </div>
        </div>
        <div id="chat-body">
            <div id="chat-messages"></div>
            <div id="chat-input-row">
                <input type="text" id="chat-input" class="terminal-input" placeholder="Message (280 chars max)..." maxlength="280">
                <button class="btn-terminal" onclick="sendChat()">SEND</button>
            </div>
        </div>
    </div>

    <!-- Bottom Status Bar -->
    <div id="statusbar">
        <span id="status-stations">STATIONS: —</span>
        <span id="status-live">LIVE: —</span>
        <span id="status-listeners">LISTENERS: —</span>
        <span id="status-time"></span>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <!-- Leaflet JS (local) -->
    <script src="vendor/leaflet/leaflet.js"></script>
    <!-- Socket.io client -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- App JS modules -->
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/map.js"></script>
    <script src="js/segments.js"></script>
    <script src="js/player.js"></script>
    <script src="js/station.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
